---
layout: default
---
<header class="cover">
  {% if page.kicker %}<div class="kicker">{{ page.kicker }}</div>{% endif %}
  <h1>{{ page.heading | default: page.title }}</h1>
  {% if page.subtitle %}<div class="sub">{{ page.subtitle }}</div>{% endif %}
  <div class="intro">
    {{ content }}
  </div>
</header>

<section class="comics">
  {% for slug in site.data.comics %}
  <figure class="comic">
    <img src="{{ '/assets/comics/' | append: slug | append: '.jpg' | relative_url }}"
         alt="Cómic: {{ slug }}" loading="lazy">
  </figure>
  {% endfor %}
</section>

<footer></footer>
