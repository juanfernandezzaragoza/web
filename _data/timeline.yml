# Year-by-year timeline. Each entry has a `year`, a list of `intereses`
# paragraphs (left column) and a list of `trayectoria` paragraphs (right column).
# Each list item becomes one <p>. You can use inline HTML like <em>...</em>.

- year: 2014
  trayectoria:
    - 'Egresé del colegio <a href="https://es.wikipedia.org/wiki/Saint_Andrew%27s_Scots_School">San Andrés</a>.'
    - "Obtuve el mejor promedio masculino en los exámenes IB (bachillerato internacional)."
    - "Obtuve el premio al mejor rendimiento en Física."
    - "Fui el presidente del <em>Student Council</em> más joven de la historia del colegio (cursando el penúltimo año)."
  intereses:
    - "Desde la adolescencia, entender la sociedad para transformarla orienta mi vida."
    - "Encontraba problemas críticos en el marxismo y quería encontrar un mejor modelo."
    - "Decidí estudiar filosofía por su generalidad y porque Marx se había formado en filosofía."

- year: 2015
  trayectoria:
    - "Cursé el ciclo básico de Filosofía en la Universidad de Buenos Aires"
    - "Dos canciones que escribí superaron el millón de reproducciones"
    - "Mi banda obtuvo la segunda canción más viral del verano en Spotify"
  intereses:
    - "Encontraba demasiado lineal la relación economía-cultura en el marxismo."
    - "Creía que sus problemas centrales nacían de ahí."
    - "Decidí estudiar psicología porque la relación cerebro-mente parecía importante."

- year: 2016
  trayectoria:
    - "Cursaba dos carreras en paralelo, desde la mañana hasta la noche:"
    - "El primer año de Psicología en la Universidad de Palermo"
    - "El primer año de Filosofía en la Universidad de Buenos Aires,"
    - "donde obtuve la nota máxima en todas las asignaturas."
  intereses:
    - "Los modelos computacionales parecían lo más extrapolable de la psicología. Decidí pasarme a computación."
    - "Estudiar perspectivas científicas y críticas posmodernas al mismo tiempo me obligó a pensar en epistemología"

- year: 2017
  trayectoria:
    - 'Impulsé el grupo interdisciplinario <a href="https://filosofiadelfuturo.com">Filosofía del Futuro</a>.'
    - "Varios participantes del grupo asistirían luego a universidades de élite global"
    - "Mantuve un rendimiento excelente en filosofía y computación."
  intereses:
    - "Entender la sociedad requería interdisciplina."
    - "La carrera obviaba temas candentes (IA, información, bioingeniería, etc)"
    - "Formé un grupo interdisciplinario para suplir esa falta"

- year: 2018
  trayectoria:
    - "Organicé el primer curso de Filosofía de la IA en mi facultad"
    - "Fui ponente en congresos nacionales e internacionales de filosofía"
    - "Tuve una breve y divertidísima incursión en el humor gráfico"
  intereses:
    - "Todavía creía que la mente era crucial para mi problema"
    - 'El “problema difícil de la conciencia” me obsesionaba. <a href="https://es.wikipedia.org/wiki/G%C3%B6del,_Escher,_Bach:_un_eterno_y_gr%C3%A1cil_bucle">GEB</a> me maravilló pero no me convenció.'
    - "Participé brevemente en grupos académicos de lógica, filosofía de la mente y filosofía de la tecnología."
    - "Buscaba fundamentos teóricos más convincentes."

- year: 2019
  trayectoria:
    - 'Participé en la primera residencia de <a href="https://cyted.org/web_redes.php?id_rede=136">REGOSH</a> en Río Grande do Sul'
    - "Impulsé BOID, proyecto de laboratorio de hardware libre en Ciudad Universitaria (UBA)"
    - "El proyecto se declaró de interés cultural por Ciudad de Buenos Aires. Obtuvo la beca de Mecenazgo Cultural de la Ciudad."
    - 'Filosofía del Futuro lanzó su <a href="https://filosofiadelfuturo.com">blog</a>'
    - "Representé a la Facultad de Filosofía en el panel de estudiantes del laboratorio CITEP (UBA) sobre IA."
  intereses:
    - "Encontré los campos más afines a mis intereses."
    - 'La <a href="https://es.wikipedia.org/wiki/Teor%C3%ADa_de_sistemas">TGS</a> y los sistemas complejos me dieron el lenguaje que buscaba.'
    - "Asistí a cursos de biología sintética y biología celular."

- year: 2020
  trayectoria:
    - "Terminé de cursar computación en 4 años (dura 6 años) estudiando filosofía en paralelo."
    - 'Organicé un <a href="https://www.youtube.com/watch?v=znOxRjARPus&list=PLW9WMn8xJQsWoYJRHr2s7xrU1SvGkruXb&index=1">curso virtual</a> de Filosofía de la Inteligencia Artificial. Participaron invitados expertos y miles de asistentes'
    - "Dicté charlas de divulgación para Instituto Baikal, Ekoparty, Di Tella y otros."
    - "La pandemia de Covid-19 detuvo el laboratorio Boid"
    - "Pausé filosofía para no recibirme a distancia. No retomé la carrera"
  intereses:
    - "Un profesor emérito me explicó que priorizar la excelencia académica entorpece la búsqueda intelectual"
    - "Hasta entonces tenía solo dos 9s en filosofía y en computación. Me irritaban porque buscaba un promedio perfecto."
    - "Pasé a centrarme en el problema que me interesaba."
    - "Entendí que la computación disolvía el problema difícil de la conciencia y el antirrealismo radical."

- year: 2021
  trayectoria:
    - "Reorientamos el proyecto Boid para monitorear ventilación con sensores de CO2 por el contexto de emergencia sanitaria."
    - 'Compartí la experiencia en el ciclo de charlas "Ciencia para ventilar" organizado por el Ministerio de Ciencia y Tecnología y el Ministerio de Educación'
    - "Empecé a trabajar part-time como redactor técnico para Faraday, empresa de ciberseguridad"
  intereses:
    - 'Encontré la clave para mis preguntas en el trabajo de <a href="https://es.wikipedia.org/wiki/Robert_Axelrod">Axelrod</a> sobre cooperación'
    - "Documenté ideas en dos libros inéditos"
    - "<em>Cordura 2100</em> incluía relatos para problematizar los paradigmas marxista y liberal"
    - '<em>Neocinismo</em> analizaba las emociones "negativas" para la cooperación, contra la autoayuda tradicional'
    - "Participé en un proyecto de tecnologías libres para monitoreo de suelos en una cooperativa agroecológica en Mendoza."

- year: 2022
  trayectoria:
    - "Empecé a trabajar como redactor técnico para la plataforma sobre ciencias de datos Interview Query"
  intereses:
    - "Escribí dos ideas centrales en el libro inédito <em>La revolución es una red</em>:"
    - "1 - Las jerarquías permiten la cooperación en grupos grandes y concentran el poder"
    - "2 - La evolución de las jerarquías ayuda a entender la historia de los sistemas económicos"

- year: 2023
  trayectoria:
    - "Pasé a dirigir el área de marketing de Interview Query."
    - "Planificaba nuevas funcionalidades del producto"
    - "Analizaba datos de uso de la plataforma"
    - "Supervisaba cursos y materiales de ciencias de datos"
  intereses:
    - "Los fundamentos de la cooperación ayudan a entender la cultura"
    - "Decidí aplicar las ideas para diseñar una red social más amigable"

- year: 2024
  trayectoria:
    - "Desarrollé Ronda, una red social para escritores basada en descentralizar la atención"
    - "Creció rápido por boca-a-boca y fue bien recibida."
    - "Sin embargo, tuvo baja retención de usuarios. Creo que participar requería demasiado esfuerzo."
    - "La red social dejó de funcionar a fin de año."
  intereses:
    - 'Redacté ideas en borradores <a href="https://txt.networkismo.com">disponibles</a>'
    - "<em>Patrones</em> resume cómo la evolución de las jerarquías permite comprender mejor la macrohistoria de los sistemas económicos"
    - "<em>Nodos</em> resume cómo la visión redista de las emociones permite comprender mejor las epidemias de malestar emocional"
    - "<em>La reforestación social</em> proponía redes alternativas para resolver crisis sociales en forma emergente"
    - "Trabajé en organizar las ideas en un paradigma integral"

- year: 2025
  trayectoria:
    - "Elaboré pruebas de concepto de sistemas de cooperación alternativos"
    - "Dicté el curso <em>El paradigma de la red</em>, sobre cómo los tejidos de cooperación permiten entender mejor la sociedad."
    - "Redacté un primer borrador del ensayo <em>La Causa</em> que resume mis aprendizajes centrales"
  intereses:
    - "La economía tiene un dilema central:"
    - "Hay cuatro sistemas básicos de cooperación: reciprocidad, reconocimiento, mercado y jerarquías."
    - "Solo el mercado y las jerarquías funcionan en grandes escalas."
    - "El mercado promueve el individualismo y las jerarquías concentran el poder."
    - "Los grandes problemas de la actualidad nacen de este dilema central."
    - "Es posible sembrar un nuevo sistema de cooperación que evite el dilema central."
